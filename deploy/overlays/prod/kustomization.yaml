apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: demo-nkp-dx96j

resources:
- ../../base

# Single edit point for image tags.
# CI runs: `kustomize edit set image <service>=<full-ref>` — which updates the
# matching entry below. Keys (`name:`) must match the base Deployment image
# names AND the `service` field in the app repo's image-refs.json.
images:
- name: admin-service
  newName: mosszmossz/case-opening-demo-admin-service
  newTag: sha-e3e1aba
- name: auth-service
  newName: mosszmossz/case-opening-demo-auth-service
  newTag: sha-e3e1aba
- name: client
  newName: mosszmossz/case-opening-demo-client
  newTag: sha-e3e1aba
- name: game-service
  newName: mosszmossz/case-opening-demo-game-service
  newTag: sha-e3e1aba
- name: prize-service
  newName: mosszmossz/case-opening-demo-prize-service
  newTag: sha-e3e1aba
